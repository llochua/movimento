    var isBlock=compat==='block'&&!isAdded;

    var borderColor=isAdded?'var(--c-lime)':isWarn?'var(--c-red)':isBlock?'var(--c-border)':'var(--c-text3)';
    var bgColor=isAdded?'var(--c-lime)':'transparent';
    var lblColor=isAdded?'#0D0D0D':isWarn?'var(--c-red)':isBlock?'var(--c-text3)':'var(--c-text)';
    var subText=isAdded?'Toca para quitar':isWarn?'⚠ Carga alta':isBlock?'No recomendado':opt.sub;
    var subColor=isAdded?'#0D0D0D':isWarn?'var(--c-red)':isBlock?'var(--c-text3)':'var(--c-text2)';

    var card=document.createElement('div');
    card.style.cssText='padding:14px 10px;border-radius:10px;border:1.5px solid '+borderColor+';background:'+bgColor+';font-family:Barlow Condensed,sans-serif;cursor:'+(isBlock?'default':'pointer')+';text-align:center;transition:all 0.12s;opacity:'+(isBlock?'0.45':'1')+';';

    var lbl=document.createElement('div');
    lbl.style.cssText='font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:-0.2px;color:'+lblColor+';line-height:1.2;';

    sl.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;opacity:'+(isAdded?'0.6':'0.5')+';color:'+subColor+';';
    sl.textContent=subText;

    card.appendChild(lbl);card.appendChild(sl);

    (function(o,isA,cp,blocked){
      card.onclick=function(){
        if(blocked)return; // bloqueado — no hace nada
        if(isA){removeExtra(o.id);closeReg();renderTrainToday(baseDayType());renderOnlyTL();}
        else{openExtraTimePicker(o,cp);}
      };
    })(opt,isAdded,compat,isBlock);

    grid.appendChild(card);
  });

  inner.appendChild(grid);

function openExtraTimePicker(opt, compat){
  _extraPendingOpt=opt;
  var savedMins=getExtraTime(opt.id, opt.defaultH ? opt.defaultH*60 : 18*60);
  _extraPendingMins=savedMins;

  var inner=document.getElementById('reg-inner');
  inner.innerHTML='';

  var handle=document.createElement('div');handle.className='sheet-handle';inner.appendChild(handle);
  var hdr=document.createElement('div');hdr.className='sheet-header';
  hdr.innerHTML='<div class="sheet-title">'+opt.label+'</div>'+
    '<div class="sheet-sub">¿A qué hora entrenas?</div>';
  inner.appendChild(hdr);

  // Advertencia si aplica
  if(compat==='warn'){
    var warn=document.createElement('div');
    warn.style.cssText='margin:0 1.5rem 8px;padding:10px 12px;border-radius:8px;background:var(--c-red-bg);border-left:3px solid var(--c-red);font-size:12px;color:var(--c-red);line-height:1.5;font-weight:600;';
    warn.textContent='⚠ Carga alta. Esto implica doble esfuerzo intenso hoy. ¿Seguro?';
    inner.appendChild(warn);
  }

  // Grid de horas inline
  var gridWrap=document.createElement('div');
  gridWrap.style.cssText='padding:0 1.5rem;';
  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-height:42vh;overflow-y:auto;';

  for(var h=5;h<=22;h++){
    [0,30].forEach(function(m){
      var mins=h*60+m;
      var btn=document.createElement('div');
      var isSel=mins===_extraPendingMins;
      btn.style.cssText='padding:10px 4px;border-radius:8px;border:1.5px solid '+(isSel?'var(--c-lime)':'var(--c-text3)')+';background:'+(isSel?'var(--c-lime)':'transparent')+';font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:800;color:'+(isSel?'#0D0D0D':'var(--c-text2)')+';cursor:pointer;text-align:center;transition:all 0.1s;';
      btn.textContent=pad(h)+':'+pad(m);
      (function(mi,el){
        el.onclick=function(){
          grid.querySelectorAll('div').forEach(function(d){
            d.style.background='transparent';
            d.style.borderColor='var(--c-text3)';
            d.style.color='var(--c-text2)';
          });
          el.style.background='var(--c-lime)';
          el.style.borderColor='var(--c-lime)';
          el.style.color='#0D0D0D';
          _extraPendingMins=mi;
          setExtraTime(_extraPendingOpt.id,mi);
        };
      })(mins,btn);
      grid.appendChild(btn);
    });
  }

  gridWrap.appendChild(grid);
  inner.appendChild(gridWrap);

  // Scroll al slot seleccionado
  setTimeout(function(){
    var btns=grid.querySelectorAll('div');
    btns.forEach(function(b){
      if(b.style.background==='var(--c-lime)')b.scrollIntoView({block:'center',behavior:'smooth'});
    });
  },80);

  var confirmLabel=compat==='warn'?'Agregar de todas formas':'Agregar '+opt.label;
  var confirmBtn=document.createElement('button');
  confirmBtn.className='sheet-confirm';
  confirmBtn.style.cssText='display:block;width:calc(100% - 3rem);margin:16px 1.5rem 0;padding:16px;border-radius:var(--r);border:none;background:var(--c-lime);color:#0D0D0D;font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;text-align:center;';
  confirmBtn.textContent=confirmLabel;
  confirmBtn.onclick=function(){
    addExtra(_extraPendingOpt.id);
    closeReg();renderTrainToday(baseDayType());renderOnlyTL();
  };
  inner.appendChild(confirmBtn);

  var backBtn=document.createElement('button');
  backBtn.className='sheet-skip';backBtn.textContent='← Volver';
  backBtn.onclick=function(){openExtraSheet();};
  inner.appendChild(backBtn);
}

// Estado de series de alberca (array de objetos {vueltas, descanso})

// Estado de series de cancha (array de objetos {sprints})

function openReg(id){
  _regId=id;
  var sc=buildSchedule();
  var item=sc.find(function(i){return i.id===id;})||{};
  if(!item.type||item.type==='pausa'||item.type==='fijo')return;

  var cc=getCardioChoice();
  var inner=document.getElementById('reg-inner');
  inner.innerHTML='';

  var titleColor=item.type==='pesas'?'var(--c-red)':'var(--c-lime)';

  var handle=document.createElement('div');handle.className='sheet-handle';inner.appendChild(handle);
  var hdr=document.createElement('div');hdr.className='sheet-header';
  hdr.innerHTML='<div class="sheet-title" style="color:'+titleColor+'">'+item.name+'</div>'+
    '<div class="sheet-sub">¿Cómo estuvo?</div>';
  inner.appendChild(hdr);

  var scrollArea=document.createElement('div');
  scrollArea.style.cssText='padding:0 1.5rem;overflow-y:auto;max-height:60vh;padding-bottom:8px;';
  scrollArea.id='reg-scroll';

  if(item.type==='cardio'&&cc==='alberca'){
    _renderRegAlberca(scrollArea);
  } else if(item.type==='cardio'&&cc==='cancha'){
    _renderRegCancha(scrollArea);
  } else if(item.type==='cardio'&&cc==='gym'){
    _renderRegGym(scrollArea);
  } else {
    // pesas u otro — solo intensidad
    scrollArea.innerHTML='<span class="reg-label">Intensidad</span>'+_intensityHTML();
  }

  inner.appendChild(scrollArea);
  _wireIntensity(inner);

  var confirmBtn=document.createElement('button');
  confirmBtn.className='sheet-confirm';
  confirmBtn.textContent='Guardar sesión';
  confirmBtn.style.cssText='background:var(--c-lime);color:#0D0D0D;margin-top:16px;';
  confirmBtn.onclick=function(){saveReg();};
  inner.appendChild(confirmBtn);

  var skipBtn=document.createElement('button');
  skipBtn.className='sheet-skip';skipBtn.textContent='Ahora no';
  skipBtn.onclick=function(){closeReg();};
  inner.appendChild(skipBtn);

  document.getElementById('reg-sheet').classList.add('show');
}

function _renderRegAlberca(container){
  var st=getSettings();
  var largo=st.albercaM||9;

      '<span class="reg-serie-unit">vuelt.</span>'+
    '</div>'+
    '<span class="reg-label">Bloques</span>'+
    '<div id="reg-alberca-series"></div>'+

      '<span class="reg-serie-lbl">Vueltas</span>'+

    _intensityHTML();

      _renderAlbercaSeries();
    };

    var coolInp=document.getElementById('reg-cool-v');
    if(warmInp)warmInp.oninput=_updateAlbercaStat;
    if(coolInp)coolInp.oninput=_updateAlbercaStat;

function _renderAlbercaSeries(){
  var cont=document.getElementById('reg-alberca-series');
  if(!cont)return;
  cont.innerHTML='';
  _regAlbercaSeries.forEach(function(s,i){
    var isLast=i===_regAlbercaSeries.length-1;
    var row=document.createElement('div');
    row.style.cssText='background:var(--c-surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--c-border);';
    row.innerHTML=
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'+
        '<span style="font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--c-text3);">Bloque '+(i+1)+'</span>'+
        (_regAlbercaSeries.length>1?'<button style="background:none;border:none;font-size:11px;color:var(--c-text3);cursor:pointer;padding:2px 6px;" data-rm="'+i+'">Quitar</button>':'')+
      '</div>'+
      '<div class="reg-serie-row" style="margin-bottom:6px;">'+
        '<span class="reg-serie-lbl">Vueltas</span>'+
        '<input class="reg-serie-inp" type="number" min="1" max="100" value="'+s.vueltas+'" data-sv="'+i+'">'+
        '<span class="reg-serie-unit">vuelt.</span>'+
      '</div>'+
      (!isLast?
        '<div class="reg-serie-row">'+
          '<span class="reg-serie-lbl">Descanso</span>'+
          '<input class="reg-serie-inp" type="number" min="0" max="300" value="'+s.descanso+'" data-sd="'+i+'">'+
          '<span class="reg-serie-unit">seg</span>'+
        '</div>':
        '<div style="font-size:10px;color:var(--c-text3);margin-top:2px;">Último bloque — sin descanso registrado</div>'
      );
    cont.appendChild(row);
  });

  // Wire inputs y quitar
  cont.querySelectorAll('[data-sv]').forEach(function(inp){
    inp.oninput=function(){
      _regAlbercaSeries[parseInt(inp.dataset.sv)].vueltas=parseInt(inp.value)||0;
      _updateAlbercaStat();
    };
  });
  cont.querySelectorAll('[data-sd]').forEach(function(inp){
    inp.oninput=function(){
      _regAlbercaSeries[parseInt(inp.dataset.sd)].descanso=parseInt(inp.value)||0;
    };
  });
  cont.querySelectorAll('[data-rm]').forEach(function(btn){
    btn.onclick=function(){
      _regAlbercaSeries.splice(parseInt(btn.dataset.rm),1);
      _renderAlbercaSeries();
      _updateAlbercaStat();
    };
  });
  _updateAlbercaStat();
}

function _updateAlbercaStat(){
  var st=getSettings();var largo=st.albercaM||9;
  var warmV=parseInt((document.getElementById('reg-warm-v')||{}).value)||0;
  var coolV=parseInt((document.getElementById('reg-cool-v')||{}).value)||0;
  var bloqueV=_regAlbercaSeries.reduce(function(a,s){return a+s.vueltas;},0);
  var total=warmV+bloqueV+coolV;
  var dist=total*largo;
  var el=document.getElementById('reg-dist-stat');
  if(el)el.textContent='Total: '+total+' vueltas · '+dist+' m (largo: '+largo+'m)';
}

function _renderCanchaSeries(){

function _updateCanchaStat(){

// ── GUARDAR ───────────────────────────────────────────────────────────
function saveReg(){
  var l=getLog();
  if(!l[_regId])l[_regId]={};
  var inner=document.getElementById('reg-inner');
  var intSel=inner.querySelector('.reg-int-opt.sel');
  if(intSel)l[_regId].intensity=intSel.dataset.int;

  var cc=getCardioChoice();

  if(cc==='alberca'){
    var warmV=parseInt((document.getElementById('reg-warm-v')||{}).value)||0;
    var coolV=parseInt((document.getElementById('reg-cool-v')||{}).value)||0;
    var st=getSettings();var largo=st.albercaM||9;
    var bloqueV=_regAlbercaSeries.reduce(function(a,s){return a+s.vueltas;},0);
    var totalV=warmV+bloqueV+coolV;
    l[_regId].calentamiento={vueltas:warmV};
    l[_regId].bloques=_regAlbercaSeries.slice();
    l[_regId].enfriamiento={vueltas:coolV};
    l[_regId].totalVueltas=totalV;
    l[_regId].distancia=totalV*largo;

  } else if(cc==='cancha'){
    var warmMin=parseInt((document.getElementById('reg-warm-min')||{}).value)||0;
    var tecMin=parseInt((document.getElementById('reg-tecnico')||{}).value)||0;
    var coolMin=parseInt((document.getElementById('reg-cool-min')||{}).value)||0;
    var st2=getSettings();var largo2=st2.canchaM||25;
    var totalSprints=_regCanchaSeries.reduce(function(a,s){return a+s.sprints;},0);
    l[_regId].calentamiento=warmMin;
    l[_regId].series=_regCanchaSeries.slice();
    l[_regId].totalSprints=totalSprints;
    l[_regId].distanciaSprints=totalSprints*largo2;
    l[_regId].tecnico=tecMin;
    l[_regId].vueltaCalma=coolMin;

  } else if(cc==='gym'){
    var remo=parseInt((document.getElementById('reg-gym-remo')||{}).value)||0;
    var cardio2=parseInt((document.getElementById('reg-gym-cardio2')||{}).value)||0;
    var estir=parseInt((document.getElementById('reg-gym-estir')||{}).value)||0;
    l[_regId].remo=remo;
    l[_regId].cardioExtra=cardio2;
    l[_regId].estiramientos=estir;
  }

  saveLog(l);
  closeReg();
  renderOnlyTL();
}

function closeReg(){document.getElementById('reg-sheet').classList.remove('show');}

// ── TIME PICKER ───────────────────────────────────────────────────────
function openTP(key,curVal){
  _tpKey=key;
  var grid=document.getElementById('tpicker-grid');
  var html='';
  for(var h=5;h<=22;h++){[0,30].forEach(function(m){
    var mins=h*60+m;
    html+='<div class="tpicker-opt'+(mins===curVal?' cur':'')+'" data-mins="'+mins+'">'+pad(h)+':'+pad(m)+'</div>';
  });}
  grid.innerHTML=html;
  grid.onclick=function(e){
    var o=e.target.closest('[data-mins]');
    if(o){
      var mins=parseInt(o.dataset.mins);
      // Si viene de Ajustes, actualiza pending — no guarda
      var fromAjustes=!!document.getElementById('aj-pesast');
      if(fromAjustes&&_ajPending){
        if(_tpKey==='pesas')_ajPending.pesasT=mins;
        else if(_tpKey==='cardio')_ajPending.cardioT=mins;
        else if(_tpKey==='caminar')_ajPending.caminaT=mins;
      } else {
        setTrainTime(_tpKey,mins);
        // Actualizar input en setup sheet si existe
        var inp=document.getElementById(_tpKey==='pesas'?'su-t':_tpKey==='cardio'?'su-ct':null);
        if(inp)inp.value=pad(Math.floor(mins/60))+':'+pad(mins%60);
      }
      // Actualizar botón en ajustes si existe
      var ajBtn=document.getElementById(_tpKey==='pesas'?'aj-pesast':_tpKey==='cardio'?'aj-cardiot':_tpKey==='caminar'?'aj-caminat':null);
      if(ajBtn)ajBtn.textContent=pad(Math.floor(mins/60))+':'+pad(mins%60);
      closeTP();
    }
  };
  document.getElementById('tpicker').classList.add('show');
  setTimeout(function(){var c=grid.querySelector('.cur');if(c)c.scrollIntoView({block:'center',behavior:'smooth'});},50);
}
function closeTP(){document.getElementById('tpicker').classList.remove('show');}

// ── YEAR PICKER ───────────────────────────────────────────────────────
var _ypY=0,_ypM=0;
function openYP(){
  var d=new Date(now().getFullYear(),now().getMonth()+histMonthOffset,1);
  _ypY=d.getFullYear();_ypM=d.getMonth();
  var nowY=now().getFullYear();
  var grid=document.getElementById('ypicker-grid');
  var html='';
  for(var yi=nowY;yi>=nowY-5;yi--){
    html+='<div class="tpicker-opt'+(yi===_ypY?' cur':'')+'" data-yr="'+yi+'">'+yi+'</div>';
  }
  grid.innerHTML=html;
  grid.onclick=function(e){var o=e.target.closest('[data-yr]');if(o)selectYear(parseInt(o.dataset.yr));};
  document.getElementById('ypicker').classList.add('show');
}
function selectYear(y){
  var d=now();
  histMonthOffset=(y-d.getFullYear())*12+(_ypM-d.getMonth());
  openHistDay=null;closeYP();renderHist();
}
function closeYP(){document.getElementById('ypicker').classList.remove('show');}

// ── THEME ─────────────────────────────────────────────────────────────
function applyTheme(dark){
  document.body.setAttribute('data-theme',dark?'dark':'light');
  localStorage.setItem('mv_theme',dark?'dark':'light');
  document.getElementById('ico-moon').style.display=dark?'none':'';
  document.getElementById('ico-sun').style.display=dark?'':'none';
}
function toggleTheme(){applyTheme(document.body.getAttribute('data-theme')!=='dark');}
(function(){applyTheme(localStorage.getItem('mv_theme')==='dark');})();

// ── VIEWS ─────────────────────────────────────────────────────────────
function switchView(name,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  // Header solo en Hoy
  document.getElementById('hdr').style.display=name==='hoy'?'':'none';
  if(name==='historial')renderHist();
  if(name==='comida')renderFood();
  if(name==='ajustes')renderAjustes();
}

// ── AJUSTES — ESTADO PENDIENTE ────────────────────────────────────────
// Nada se escribe a localStorage hasta ajConfirmSave()
var _ajPending=null; // null = no hay sesión de edición abierta

function ajStartEditing(){
  var st=getSettings();
  _ajPending={
    // equipo
    tieneAlberca:st.tieneAlberca!==false,
    tieneCancha:st.tieneCancha!==false,
    tieneGym:st.tieneGym!==false,
    tieneRemo:st.tieneRemo!==false,
    tieneCuerda:st.tieneCuerda!==false,
    tieneRueda:st.tieneRueda!==false,
    // espacios
    albercaM:st.albercaM||9,
    canchaM:st.canchaM||25,
    // horarios (en minutos)
    pesasT:getTrainTime('pesas',(st.pesasDefaultH||20)*60),
    cardioT:getTrainTime('cardio',(st.cardioDefaultH||20)*60),
    caminaT:getTrainTime('caminar',15*60+30),
    // jornada
    jorStart:parseInt(localStorage.getItem('mv_jor_start')||'9'),
    jorEnd:parseInt(localStorage.getItem('mv_jor_end')||'19'),
    // días de oficina
    oficinaDays:getOficinadays().slice(),
    // día especial
    special:getSpecial()
  };
}

function ajReadForm(){
  if(!_ajPending)return;
  var equipoMap={
    'adj-alberca-tog':'tieneAlberca','adj-cancha-tog':'tieneCancha',
    'adj-gym':'tieneGym','adj-remo':'tieneRemo',
    'adj-cuerda':'tieneCuerda','adj-rueda':'tieneRueda'
  };
  Object.keys(equipoMap).forEach(function(id){
    var el=document.getElementById(id);
    if(el)_ajPending[equipoMap[id]]=el.checked;
  });
  var al=document.getElementById('adj-alberca');if(al)_ajPending.albercaM=parseInt(al.value)||9;
  var ca=document.getElementById('adj-cancha');if(ca)_ajPending.canchaM=parseInt(ca.value)||25;
  var s=document.getElementById('aj-jor-start');if(s)_ajPending.jorStart=parseInt(s.value);
  var e=document.getElementById('aj-jor-end');if(e)_ajPending.jorEnd=parseInt(e.value);
}

function ajConfirmSave(){
  if(!_ajPending)return;
  ajReadForm();
  // Guardar todo
  var st=getSettings();
  st.tieneAlberca=_ajPending.tieneAlberca;
  st.tieneCancha=_ajPending.tieneCancha;
  st.tieneGym=_ajPending.tieneGym;
  st.tieneRemo=_ajPending.tieneRemo;
  st.tieneCuerda=_ajPending.tieneCuerda;
  st.tieneRueda=_ajPending.tieneRueda;
  st.albercaM=_ajPending.albercaM;
  st.canchaM=_ajPending.canchaM;
  saveSettings(st);
  localStorage.setItem('mv_jor_start',_ajPending.jorStart);
  localStorage.setItem('mv_jor_end',_ajPending.jorEnd);
  setOficinadays(_ajPending.oficinaDays);
  // día especial
  if(_ajPending.special)localStorage.setItem('mv_sp_'+todayKey(),_ajPending.special);
  else localStorage.removeItem('mv_sp_'+todayKey());
  // horarios
  setTrainTime('pesas',_ajPending.pesasT);
  setTrainTime('cardio',_ajPending.cardioT);
  setTrainTime('caminar',_ajPending.caminaT);
  _ajPending=null;
  ajFlashSaved();
  renderHoy();
}

function ajFlashSaved(){
  var el=document.getElementById('aj-saved');
  if(!el)return;
  el.classList.add('show');
  clearTimeout(window._ajSavedT);
  window._ajSavedT=setTimeout(function(){el.classList.remove('show');},1800);
}

// Solo actualiza bloqueo visual de inputs — sin guardar nada
function ajUpdateLock(){
  var alTog=document.getElementById('adj-alberca-tog');
  var caTog=document.getElementById('adj-cancha-tog');
  var alInp=document.getElementById('adj-alberca');
  var caInp=document.getElementById('adj-cancha');
  if(alTog&&alInp){alInp.disabled=!alTog.checked;alInp.style.opacity=alTog.checked?'1':'0.35';}
  if(caTog&&caInp){caInp.disabled=!caTog.checked;caInp.style.opacity=caTog.checked?'1':'0.35';}
}

// ── EXPORTAR / IMPORTAR ───────────────────────────────────────────────
function exportarDatos(){
  var data={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    data[k]=localStorage.getItem(k);
  }
  var json=JSON.stringify(data,null,2);
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='movimento_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importarDatos(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var keys=Object.keys(data);
      keys.forEach(function(k){localStorage.setItem(k,data[k]);});
      input.value='';
      alert('✓ '+keys.length+' datos restaurados. La app se va a recargar.');
      location.reload();
    }catch(err){
      alert('Error al leer el archivo. Asegúrate de usar un backup válido de Movimento.');
    }
  };
  reader.readAsText(file);
}

var PWORDS=['pollo','pescado','huevo','atun','frijol','queso','yogurt','carne','salmon','sardina','leguminosa','res','pechuga'];
function hasProt(s){return s?PWORDS.some(function(w){return s.toLowerCase().indexOf(w)>=0;}):false;}

function renderFood(){
  var tk=todayKey();
  var entry=foodLog.find(function(e){return e.date===tk;});
  var des=entry?entry.des||'':'',com=entry?entry.com||'':'',cen=entry?entry.cen||'':'',snk=entry?entry.snk||'':'';
  var meals=[des,com,cen,snk].filter(Boolean);
  var prot=meals.filter(hasProt).length;
  var protTxt=prot>=3?'Proteína alta':prot>=2?'Proteína ok':prot===1?'Proteína baja':'Sin proteína';
  var type=baseDayType();
  var sugs=SUGS[type]||SUGS.rest;

  var fh=document.getElementById('food-hdr');
  fh.innerHTML='<div class="food-stats">'+
    '<span class="fstat-count">'+meals.length+'</span>'+
    '<span class="fstat-label">&nbsp;/ 4 comidas</span>'+
    '<span class="fstat-prot'+(prot>=2?' good':'')+'">'+protTxt+'</span>'+
  '</div>'+
  '<div class="sug-tags">'+sugs.map(function(s,i){
    return'<div class="sug-tag" data-si="'+i+'"><span class="sug-tag-field">'+{des:'Desayuno',com:'Comida',cen:'Cena',snk:'Snack'}[s.f]+'</span>'+s.lbl+'</div>';
  }).join('')+'</div>';

  fh.querySelector('.sug-tags').onclick=function(e){
    var t=e.target.closest('[data-si]');if(t)applySug(sugs[parseInt(t.dataset.si)]);
  };

  var fb=document.getElementById('food-body');
  var flds=[['des','Desayuno',des],['com','Comida',com],['cen','Cena',cen],['snk','Snack',snk]];
  if(entry&&!foodEditMode){
    fb.innerHTML='<div class="food-saved">'+
      '<div class="food-saved-hdr"><div class="food-saved-title">Registrado hoy</div><div class="food-edit-lnk" id="food-edit">Editar</div></div>'+
      flds.map(function(f){return'<div class="food-field"><div class="food-key">'+f[1]+'</div><div class="food-val'+(f[2]?'':' empty')+'">'+(f[2]||'—')+'</div></div>';}).join('')+
    '</div>';
    var eb=document.getElementById('food-edit');if(eb)eb.onclick=function(){foodEditMode=true;renderFood();};
  } else {
    fb.innerHTML='<div class="food-form">'+
      (entry?'<div style="text-align:right;padding:8px 0"><span style="font-size:12px;color:var(--c-text3);cursor:pointer" id="food-cancel">Cancelar</span></div>':'')+
      flds.map(function(f){return'<div class="food-field"><div class="food-key">'+f[1]+'</div><input class="food-inp" id="fi-'+f[0]+'" placeholder="ej. '+f[1].toLowerCase()+'..." value="'+(f[2]||'').replace(/"/g,'&quot;')+'" oninput="updFood()"></div>';}).join('')+
      '<button class="btn" id="food-save" style="margin-top:12px">'+(entry?'Actualizar':'Guardar día')+'</button>'+
    '</div>';
    var cb=document.getElementById('food-cancel');if(cb)cb.onclick=function(){foodEditMode=false;renderFood();};
    var sb=document.getElementById('food-save');if(sb)sb.onclick=saveFood;
  }
}
function applySug(s){foodEditMode=true;renderFood();var el=document.getElementById('fi-'+s.f);if(el){el.value=s.v;el.focus();updFood();}}
function updFood(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};

function saveFood(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  var des=g('fi-des'),com=g('fi-com'),cen=g('fi-cen'),snk=g('fi-snk');

  if(idx>=0)foodLog[idx]=entry;else foodLog.unshift(entry);
  localStorage.setItem('mv_food',JSON.stringify(foodLog));
  foodEditMode=false;renderFood();showToast('pausa');
}

// ── HISTORIAL ─────────────────────────────────────────────────────────
function renderHist(){
  var d=now();
  var target=new Date(d.getFullYear(),d.getMonth()+histMonthOffset,1);
  var y=target.getFullYear(),mo=target.getMonth();
  var lbl=document.getElementById('hist-month');
  if(lbl)lbl.textContent=MF[mo].toUpperCase()+' '+y;

  var allKeys={};
  for(var k in localStorage){
    if(k.indexOf('mv_log_')===0){
      var dk=k.replace('mv_log_','');
      if(/^\d{4}-\d{2}-\d{2}$/.test(dk)){
        var p=dk.split('-');
        if(parseInt(p[0])===y&&parseInt(p[1])-1===mo)allKeys[dk]=true;
      }
    }
  }
  foodLog.forEach(function(e){
    if(e.date&&/^\d{4}-\d{2}-\d{2}$/.test(e.date)){
      var p2=e.date.split('-');
      if(parseInt(p2[0])===y&&parseInt(p2[1])-1===mo)allKeys[e.date]=true;
    }
  });

  var days=Object.keys(allKeys).sort(function(a,b){return b>a?1:-1;});
  var hl=document.getElementById('hist-list');
  if(!hl)return;
  if(!days.length){hl.innerHTML='<div class="empty">Sin registros este mes</div>';return;}

  var nm2={p900:'Inicio jornada',p1030:'Pausa activa',p1200:'Hidratación',p1330:'Est. cadera',p1500:'Pausa activa',p1700:'Hidratación',p1900:'Cierre jornada',plancha:'Plancha',pesas:'Pesas',cardio:'Cardio'};

  var html=days.map(function(dk){
    var isOpen=openHistDay===dk;
    var log2=JSON.parse(localStorage.getItem('mv_log_'+dk)||'{}');
    var doneIds=Object.keys(log2).filter(function(id){return log2[id].done;});
    var skipIds=Object.keys(log2).filter(function(id){return log2[id].skip||log2[id].skipped;});
    var fe=foodLog.find(function(e){return e.date===dk;});
    var label=fmtKey(dk);
    var chips=(doneIds.length?'<span class="hist-chip-done">✓ '+doneIds.length+'</span>':'')+
      (skipIds.length?'<span class="hist-chip-skip">saltado</span>':'')+
      (fe?'<span class="hist-chip-food">comida</span>':'');

    var body='';
    if(isOpen){
      if(doneIds.length){
        body+='<div class="hist-sect-lbl">Actividades</div>';
        body+=doneIds.map(function(id){
          var l=log2[id];
          var t=l.start&&l.start!==l.done?l.start+' → '+l.done:l.done;
          var extra=l.intensity?' · '+l.intensity:'';
          return'<div class="hist-act-row"><span class="hist-act-name">'+(nm2[id]||id)+'</span><span class="hist-act-time">'+t+extra+'</span></div>';
        }).join('');
        // Detalle alberca si existe
        var cLog=log2['cardio']||{};
        if(cLog.series&&cLog.series.length){
          body+='<div class="hist-act-row" style="padding-left:12px"><span class="hist-act-name" style="color:var(--c-text3)">'+cLog.series.join(' + ')+' vueltas · '+cLog.distancia+'m</span></div>';
        }
      }
      if(fe){
        body+='<div class="hist-sect-lbl" style="margin-top:10px">Comida</div>';
        var flds2=[['des','Desayuno'],['com','Comida'],['cen','Cena'],['snk','Snack']];
        body+=flds2.map(function(f){
          var val=(fe[f[0]]||'').replace(/</g,'&lt;');
          return'<div class="hist-food-row"><div class="hist-food-key">'+f[1]+'</div><input class="hist-food-inp" data-dk="'+dk+'" data-field="'+f[0]+'" value="'+val+'" placeholder="—"></div>';
        }).join('');
        body+='<button class="hist-save-btn" data-savedk="'+dk+'">Guardar cambios</button>';
      }
    }

    return'<div class="hist-day" data-dk="'+dk+'">'+
      '<div class="hist-day-hdr">'+
        '<div><div class="hist-day-date">'+label+'</div><div class="hist-chips">'+chips+'</div></div>'+
        '<div class="hist-arrow'+(isOpen?' open':'')+'">›</div>'+
      '</div>'+
      (isOpen?'<div class="hist-body">'+body+'</div>':'')+
    '</div>';
  }).join('');

  hl.innerHTML=html;
  hl.onclick=function(e){
    var save=e.target.closest('[data-savedk]');
    if(save){
      var dk2=save.dataset.savedk;
      var idx=foodLog.findIndex(function(x){return x.date===dk2;});
      if(idx>=0){
        hl.querySelectorAll('[data-dk="'+dk2+'"][data-field]').forEach(function(inp){foodLog[idx][inp.dataset.field]=inp.value.trim();});
        localStorage.setItem('mv_food',JSON.stringify(foodLog));
        openHistDay=null;renderHist();
      }
      return;
    }
    var hdr=e.target.closest('.hist-day-hdr');
    if(hdr){var day=hdr.closest('.hist-day');if(day){openHistDay=openHistDay===day.dataset.dk?null:day.dataset.dk;renderHist();}}
  };
}

// ── TICK ──────────────────────────────────────────────────────────────
var _tickLastNextId=null;
var _tickLastFuture=null;

function tick(){
  var d=now();
  var cl=document.getElementById('clock');if(cl)cl.textContent=pad(d.getHours())+':'+pad(d.getMinutes());
  var ds=document.getElementById('datestr');if(ds)ds.textContent=DE[d.getDay()]+' '+d.getDate()+' '+ME[d.getMonth()];
  var chip=document.getElementById('nchip');if(!chip)return;
  var sc=buildSchedule(),log=getLog(),nm=nowM(),next=null;
  for(var i=0;i<sc.length;i++){var it=sc[i];var il=log[it.id]||{};if(!il.done&&!il.skip&&it.t>=nm){next=it;break;}}
  if(next){var df=next.t-nm;chip.textContent=(df>=60?Math.floor(df/60)+'h ':'')+( df%60>0?df%60+'min — ':' — ')+pad(Math.floor(next.t/60))+':'+pad(next.t%60);}
  else chip.textContent='día cerrado';

  // Refrescar hero si el estado cambió:
  // 1) El nextItem es distinto al del tick anterior (actividad completada externamente)
  // 2) Una actividad que era futura acaba de entrar en rango (diff <= 0 o dentro de 90s)
  var nextId=next?next.id:null;
  var isFuture=next?(next.t-nm)>0:false;
  var enteredRange=(_tickLastFuture===true&&isFuture===false);
  var nextChanged=(nextId!==_tickLastNextId);
  if(nextChanged||enteredRange){renderHero();}
  _tickLastNextId=nextId;
  _tickLastFuture=isFuture;
}

// ── NOTIFICACIONES ────────────────────────────────────────────────────
function reqNotif(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default')Notification.requestPermission().then(function(p){if(p==='granted')schedNotif();});
  else if(Notification.permission==='granted')schedNotif();
}
function schedNotif(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  var sc=buildSchedule(),log=getLog(),nm=nowM(),next=null;
  for(var i=0;i<sc.length;i++){var it=sc[i];if(!(log[it.id]||{}).done&&!(log[it.id]||{}).skip&&it.t>nm){next=it;break;}}
  if(!next)return;
  var ms=(next.t-nm)*60*1000;
  if(window._nt)clearTimeout(window._nt);
  window._nt=setTimeout(function(){
    new Notification('Movimiento — '+next.name,{body:next.desc,tag:'mv-'+next.id,renotify:true});schedNotif();
  },ms);
}


// ── SESIÓN GUIADA ──────────────────────────────────────────────────────
var _sess={
  exercises:[],  // lista de ejercicios expandidos (una entrada por serie)
  step:-1,       // -1=overview, 0..n=ejercicio/descanso, done=fin
  restTimer:null,
  restRemaining:0,
  startTime:0,
  totalSeries:0,
  seriesDone:0
};

// Construir lista de pasos expandidos desde RUTINA
function buildSessionSteps(dia){
  var r=RUTINA[dia];
  if(!r)return[];
  var steps=[];
  r.exercises.forEach(function(ex,ei){
    if(ex.sets===0){
      // Calentamiento — un solo paso
      steps.push({type:'warm',ex:ex,ei:ei});
    } else {
      // Por cada serie del ejercicio
      for(var s=1;s<=ex.sets;s++){
        steps.push({type:'exercise',ex:ex,serie:s,totalSeries:ex.sets,ei:ei});
        // Descanso después de cada serie EXCEPTO la última del último ejercicio
        var isLastSerie=s===ex.sets;
        var isLastEx=ei===r.exercises.length-1;
        if(!(isLastSerie&&isLastEx)){
          steps.push({type:'rest',ex:ex,serie:s,restSec:ex.restSec,next:null});
        }
      }
    }
  });
  // Asignar "next" a cada descanso
  steps.forEach(function(step,i){
    if(step.type==='rest'){
      var nextEx=steps.slice(i+1).find(function(s){return s.type==='exercise'||s.type==='warm';});
      step.next=nextEx?nextEx.ex:null;
    }
  });
  return steps;
}

function openSession(dia){
  var r=RUTINA[dia];
  if(!r)return;
  _sess.exercises=buildSessionSteps(dia);
  _sess.step=-1;
  _sess.startTime=Date.now();
  _sess.totalSeries=r.exercises.reduce(function(acc,ex){return acc+(ex.sets||0);},0);
  _sess.seriesDone=0;

  // Render overview
  document.getElementById('ov-title').textContent=r.label;
  document.getElementById('ov-sub').textContent=r.sub+' · '+r.exercises.length+' ejercicios';
  var list=document.getElementById('ov-list');
  list.innerHTML=r.exercises.map(function(ex,i){
    var detail=ex.sets===0?'Calentamiento':ex.sets+'×'+(typeof ex.reps==='string'?ex.reps:ex.reps+' reps');
    return'<div class="session-ov-item">'+
      '<div class="session-ov-num">'+(i+1)+'</div>'+
      '<div style="flex:1"><div class="session-ov-name">'+ex.name+'</div></div>'+
      '<div class="session-ov-detail">'+detail+'</div>'+
    '</div>';
  }).join('');

  showSessionPhase('overview');
  document.getElementById('session-bar').style.width='0%';
  document.getElementById('session-counter').textContent='';
  document.getElementById('session-cta').textContent='Empezar';
  document.getElementById('session-cta').disabled=false;
  document.getElementById('session-cta-sec').style.display='none';
  document.getElementById('session-exit').onclick=function(){closeSession();};
  document.getElementById('session-cta').onclick=function(){advanceSession();};

  // Wakelock
  if(navigator.wakeLock){
    navigator.wakeLock.request('screen').catch(function(){});
  }

  document.getElementById('session-screen').classList.add('active');
}

function showSessionPhase(phase){
  ['overview','exercise','rest','done'].forEach(function(p){
    var el=document.getElementById('session-'+p);
    if(el)el.classList.toggle('active',p===phase);
  });
}

function advanceSession(){
  if(_sess.step===-1){
    // Ir al primer paso
    _sess.step=0;
    renderSessionStep();
    return;
  }
  var step=_sess.exercises[_sess.step];
  if(!step){
    // Fin
    finishSession();
    return;
  }
  if(step.type==='rest'){
    // Saltar descanso
    clearInterval(_sess.restTimer);
    _sess.step++;
    renderSessionStep();
    return;
  }
  // Completar serie/warm
  if(step.type==='exercise')_sess.seriesDone++;
  _sess.step++;
  if(_sess.step>=_sess.exercises.length){
    finishSession();
    return;
  }
  renderSessionStep();
}

function renderSessionStep(){
  var step=_sess.exercises[_sess.step];
  if(!step){finishSession();return;}

  // Progreso
  var pct=Math.round((_sess.step/_sess.exercises.length)*100);
  document.getElementById('session-bar').style.width=pct+'%';

  if(step.type==='warm'){
    showSessionPhase('exercise');
    document.getElementById('ex-label').textContent='Calentamiento';
    document.getElementById('ex-name').textContent=step.ex.name;
    document.getElementById('ex-series').textContent='';
    document.getElementById('ex-reps').textContent='2 min';
    document.getElementById('ex-reps-label').textContent='';
    document.getElementById('ex-desc').textContent=step.ex.desc;
    document.getElementById('session-counter').textContent='Inicio';
    var nextStep=_sess.exercises[_sess.step+1];
    document.getElementById('ex-next').textContent=nextStep?'Siguiente: '+nextStep.ex.name:'';
    document.getElementById('session-cta').textContent='Listo, empezamos';
    document.getElementById('session-cta-sec').style.display='none';

  } else if(step.type==='exercise'){
    showSessionPhase('exercise');
    var isLast=step.serie===step.totalSeries;
    var exIdx=_sess.exercises.slice(0,_sess.step).filter(function(s){return s.type!=='rest'&&s.ei!==step.ei;}).length;
    document.getElementById('ex-label').textContent='Ejercicio '+(step.ei+1)+' de '+RUTINA[getPesasDay()].exercises.length;
    document.getElementById('ex-name').textContent=step.ex.name;
    document.getElementById('ex-series').textContent='Serie '+step.serie+' de '+step.totalSeries;
    document.getElementById('ex-reps').textContent=step.ex.reps;
    document.getElementById('ex-reps-label').textContent=typeof step.ex.reps==='number'?'repeticiones':step.ex.reps.indexOf('seg')>=0?'tiempo':'';
    document.getElementById('ex-desc').textContent=step.ex.desc;
    document.getElementById('session-counter').textContent=_sess.seriesDone+' / '+_sess.totalSeries;
    var nextS=_sess.exercises[_sess.step+1];
    document.getElementById('ex-next').textContent=nextS?(nextS.type==='rest'?'Después: '+nextS.restSec+' seg descanso':'Siguiente: '+nextS.ex.name):'Último paso';
    document.getElementById('session-cta').textContent=isLast&&step.ei===RUTINA[getPesasDay()].exercises.length-1?'Terminar sesión':'Serie completada ✓';
    document.getElementById('session-cta-sec').style.display='none';

  } else if(step.type==='rest'){
    showSessionPhase('rest');
    _sess.restRemaining=step.restSec;
    document.getElementById('rest-timer').textContent=step.restSec;
    document.getElementById('rest-next').textContent=step.next?'Siguiente: '+step.next.name:'';
    document.getElementById('session-cta').textContent='Saltar descanso';
    document.getElementById('session-cta-sec').style.display='none';

    clearInterval(_sess.restTimer);
    _sess.restTimer=setInterval(function(){
      _sess.restRemaining--;
      document.getElementById('rest-timer').textContent=_sess.restRemaining;
      if(_sess.restRemaining<=0){
        clearInterval(_sess.restTimer);
        if(navigator.vibrate)navigator.vibrate([50,30,80]);
        _sess.step++;
        renderSessionStep();
      }
    },1000);
  }
}

function finishSession(){
  clearInterval(_sess.restTimer);
  showSessionPhase('done');

  var elapsed=Math.round((Date.now()-_sess.startTime)/60000);
  var dia=getPesasDay();
  var r=RUTINA[dia];

  document.getElementById('done-sub').textContent=r.label+' completado';
  document.getElementById('done-stats').innerHTML=
    '<div class="session-done-stat"><div class="session-done-stat-val">'+elapsed+'</div><div class="session-done-stat-lbl">minutos</div></div>'+
    '<div class="session-done-stat"><div class="session-done-stat-val">'+_sess.seriesDone+'</div><div class="session-done-stat-lbl">series</div></div>'+
    '<div class="session-done-stat"><div class="session-done-stat-val">'+r.exercises.filter(function(e){return e.sets>0;}).length+'</div><div class="session-done-stat-lbl">ejercicios</div></div>';

  document.getElementById('session-bar').style.width='100%';
  document.getElementById('session-counter').textContent='✓';
  document.getElementById('session-cta').textContent='Cerrar';
  document.getElementById('session-cta').disabled=true; // habilitar al seleccionar feedback
  document.getElementById('session-cta').onclick=function(){
    saveSessionFeedback();
    closeSession();
  };
  document.getElementById('session-cta-sec').style.display='none';
  document.getElementById('session-exit').onclick=function(){closeSession();};

  // Auto-marcar plancha si el día la incluye
  if(planchaIncludedInPesas()){
    var l=getLog();
    if(!l['plancha'])l['plancha']={};
    l['plancha'].done=pad(Math.floor(nowM()/60))+':'+pad(nowM()%60);
    l['plancha'].auto=true;
    saveLog(l);
  }

  // Marcar pesas como done
  markDone('pesas');
}

function selectFeedback(el){
  document.querySelectorAll('.session-feedback-opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  document.getElementById('session-cta').disabled=false;
}

function saveSessionFeedback(){
  var sel=document.querySelector('.session-feedback-opt.sel');
  if(!sel)return;
  var fb=sel.dataset.fb;
  var dia=getPesasDay();
  // Guardar feedback para motor de fases
  var key='mv_feedback_'+todayKey()+'_pesas';
  localStorage.setItem(key,fb);
  // Contar sesiones para motor de fases
  var count=parseInt(localStorage.getItem('mv_phase_sessions')||'0')+1;
  localStorage.setItem('mv_phase_sessions',count);
  // Aviso de cambio de fase cada 8 sesiones
  if(count%8===0){
    var phase=parseInt(localStorage.getItem('mv_phase')||'1');
    localStorage.setItem('mv_phase_pending_upgrade','1');
  }
}

function closeSession(){
  clearInterval(_sess.restTimer);
  document.getElementById('session-screen').classList.remove('active');
  renderHoy();
}
